name: Weekly Anomaly Report

on:
  schedule:
    - cron: '0 8 * * 1'  # runs every Monday at 08:00 UTC
  workflow_dispatch:       # also allows manual trigger from the GitHub Actions tab

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # pulls your repo code onto GitHub's server

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # matches your local Python version

      - name: Install dependencies
        run: |
          pip install --upgrade pip           # upgrade pip first
          pip install -r requirements.txt     # install everything from your pinned file

      - name: Execute notebook
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}  # injected from GitHub repository secrets
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}     # injected from GitHub repository secrets
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}     # injected from GitHub repository secrets
          REPORT_TO:    ${{ secrets.REPORT_TO }}      # injected from GitHub repository secrets
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/04_narrative_report.ipynb  # runs every cell top to bottom, like clicking Run All

      - name: Upload HTML report as artifact
        if: always()  # upload even if a previous step failed, so we can inspect the output
        uses: actions/upload-artifact@v4
        with:
          name: anomaly-report-${{ github.run_id }}  # unique name per run
          path: data/anomaly_report_*.html            # picks up the date-stamped HTML file
          retention-days: 30                          # kept for 30 days then auto-deleted